name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  typecheck-and-test:
    name: Typecheck & Unit/Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: roadboard
          POSTGRES_PASSWORD: roadboard
          POSTGRES_DB: roadboard
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U roadboard"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://roadboard:roadboard@localhost:5433/roadboard
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm db:generate

      - name: Run migrations
        run: pnpm db:migrate

      - name: Typecheck all packages
        run: pnpm turbo typecheck

      - name: Unit and integration tests
        run: pnpm turbo test

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: typecheck-and-test

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: roadboard
          POSTGRES_PASSWORD: roadboard
          POSTGRES_DB: roadboard
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U roadboard"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://roadboard:roadboard@localhost:5433/roadboard
      CORE_API_URL: http://localhost:3001
      AUTH_URL: http://localhost:3002

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm db:generate

      - name: Build all apps
        run: pnpm turbo build

      - name: Run migrations and seed
        run: pnpm db:migrate && pnpm db:seed

      - name: Install Playwright browsers
        run: pnpm --filter web-app exec playwright install chromium --with-deps

      - name: Start auth-access
        run: |
          DATABASE_URL=postgresql://roadboard:roadboard@localhost:5433/roadboard \
          AUTH_ACCESS_PORT=3002 \
          node apps/auth-access/dist/main.js &
          npx wait-on http://localhost:3002/health --timeout 30000

      - name: Start core-api
        run: |
          DATABASE_URL=postgresql://roadboard:roadboard@localhost:5433/roadboard \
          CORE_API_PORT=3001 AUTH_ACCESS_PORT=3002 \
          node apps/core-api/dist/main.js &
          npx wait-on http://localhost:3001/health --timeout 30000

      - name: Verify services health
        run: |
          curl -f http://localhost:3002/health || (echo "auth-access not healthy" && exit 1)
          curl -f http://localhost:3001/health || (echo "core-api not healthy" && exit 1)

      - name: Run Playwright tests
        run: pnpm --filter web-app test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web-app/playwright-report/
          retention-days: 7
