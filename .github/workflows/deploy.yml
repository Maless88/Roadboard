name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-roadboard
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, roadboard]
    steps:
      - name: Pull latest
        working-directory: /opt/roadboard
        run: |
          git fetch --all --prune
          git reset --hard origin/main

      - name: Build and restart
        working-directory: /opt/roadboard/infra/docker
        run: |
          cp /opt/roadboard/.env .
          export GIT_SHA=$(git -C /opt/roadboard rev-parse HEAD)
          export BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "Building GIT_SHA=$GIT_SHA BUILD_TIME=$BUILD_TIME"
          docker compose build
          docker compose up -d

      - name: Prune old images
        run: docker image prune -f
