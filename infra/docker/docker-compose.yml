name: roadboard

# ── Shared build context ─────────────────────────────────────────────────────
# All NestJS services are built from the root Dockerfile with ARG APP_NAME.
# The web-app uses its own Dockerfile (apps/web-app/Dockerfile).
# Both Dockerfiles must be built from the monorepo root (context: ../..).

x-nestjs-build: &nestjs-build
  context: ../..
  dockerfile: Dockerfile

x-common-env: &common-env
  DATABASE_URL: postgresql://roadboard:roadboard@postgres:5432/roadboard
  REDIS_URL: redis://redis:6379
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  CORE_API_HOST: core-api
  AUTH_ACCESS_HOST: auth-access
  GRAPH_DB_URL: bolt://memgraph:7687
  GRAPH_DB_USER: ""
  GRAPH_DB_PASSWORD: ""
  GRAPH_SYNC_USE_OUTBOX: ${GRAPH_SYNC_USE_OUTBOX:-false}
  NODE_ENV: production


services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: roadboard
      POSTGRES_PASSWORD: roadboard
      POSTGRES_DB: roadboard
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U roadboard"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  memgraph:
    image: memgraph/memgraph:2.18.1
    restart: unless-stopped
    command:
      - --log-level=WARNING
      - --bolt-port=7687
      - --also-log-to-stderr
    ports:
      - "127.0.0.1:7687:7687"
    volumes:
      - memgraph-data:/var/lib/memgraph
      - memgraph-log:/var/log/memgraph
    healthcheck:
      test: ["CMD-SHELL", "echo 'RETURN 1;' | mgconsole --host 127.0.0.1 --port 7687 --username= --password= 2>/dev/null | grep -q 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ── One-shot database bootstrap ──────────────────────────────────────────────

  db-bootstrap:
    build:
      <<: *nestjs-build
      target: workspace
    environment:
      DATABASE_URL: postgresql://roadboard:roadboard@postgres:5432/roadboard
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-}
    command:
      - sh
      - -ec
      - pnpm --filter @roadboard/database exec prisma migrate deploy --schema prisma/schema.prisma && pnpm --filter @roadboard/database... build && pnpm --filter @roadboard/database db:seed
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ── Backend services ─────────────────────────────────────────────────────────

  core-api:
    build:
      <<: *nestjs-build
      args:
        APP_NAME: core-api
        GIT_SHA: ${GIT_SHA:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    restart: unless-stopped
    environment:
      <<: *common-env
      CORE_API_PORT: "3001"
      AUTH_ACCESS_PORT: "3002"
      AGENT_CLI_BRIDGE_URL: ${AGENT_CLI_BRIDGE_URL:-http://host.docker.internal:8787/run}
      AGENT_CLI_BRIDGE_TOKEN: ${AGENT_CLI_BRIDGE_TOKEN:-}
      AGENTS_ENABLED: ${AGENTS_ENABLED:-false}
      AGENT_WORKSPACES_BASE: ${AGENT_WORKSPACES_BASE:-/home/alessio/agent-workspaces}
      NOTIFY_URL: ${NOTIFY_URL:-http://host.docker.internal:8788/send}
      NOTIFY_TOKEN: ${NOTIFY_TOKEN:-}
      FCM_SERVICE_ACCOUNT_FILE: ${FCM_SERVICE_ACCOUNT_FILE:-/run/secrets/fcm-service-account.json}
      EMAIL_HELPER_URL: ${EMAIL_HELPER_URL:-http://host.docker.internal:8789}
      EMAIL_HELPER_TOKEN: ${EMAIL_HELPER_TOKEN:-}
      CALENDAR_HELPER_URL: ${CALENDAR_HELPER_URL:-http://host.docker.internal:8790}
      CALENDAR_HELPER_TOKEN: ${CALENDAR_HELPER_TOKEN:-}
      GITHUB_REPO: ${GITHUB_REPO:-Maless88/Roadboard}
      GITHUB_READ_TOKEN: ${GITHUB_READ_TOKEN:-}
      ROADBOARD_REPO_PATH: /opt/roadboard
      ROADBOARD_COMPOSE_FILE: infra/docker/docker-compose.yml
      ROADBOARD_DEPLOY_BRANCH: ${ROADBOARD_DEPLOY_BRANCH:-main}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${BIND_ADDR:-127.0.0.1}:3001:3001"
    volumes:
      # Self-hosted deploy: container must be able to run
      # `git pull` on the host repo; a host systemd path-unit
      # (roadboard-deploy.path) does git pull + docker compose up.
      # docker.sock removed 2026-06-23 (security: container == root host).
      - ${ROADBOARD_HOST_REPO_PATH:-../..}:/opt/roadboard
      # FCM service-account (secret): mounted read-only, never in the image/repo
      - ${FCM_SERVICE_ACCOUNT_HOST:-/home/alessio/.config/roadboard/fcm-service-account.json}:/run/secrets/fcm-service-account.json:ro
    depends_on:
      db-bootstrap:
        condition: service_completed_successfully
      memgraph:
        condition: service_healthy

  auth-access:
    build:
      <<: *nestjs-build
      args:
        APP_NAME: auth-access
        GIT_SHA: ${GIT_SHA:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    restart: unless-stopped
    environment:
      <<: *common-env
      AUTH_ACCESS_PORT: "3002"
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-production}
    ports:
      - "${BIND_ADDR:-127.0.0.1}:3002:3002"
    depends_on:
      db-bootstrap:
        condition: service_completed_successfully

  mcp-service:
    build:
      <<: *nestjs-build
      args:
        APP_NAME: mcp-service
        GIT_SHA: ${GIT_SHA:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    restart: unless-stopped
    environment:
      <<: *common-env
      CORE_API_PORT: "3001"
      AUTH_ACCESS_PORT: "3002"
      AGENT_CLI_BRIDGE_URL: ${AGENT_CLI_BRIDGE_URL:-http://host.docker.internal:8787/run}
      AGENT_CLI_BRIDGE_TOKEN: ${AGENT_CLI_BRIDGE_TOKEN:-}
      AGENTS_ENABLED: ${AGENTS_ENABLED:-false}
      MCP_TRANSPORT: "http"
      MCP_HTTP_PORT: "3005"
      EMAIL_HELPER_URL: ${EMAIL_HELPER_URL:-http://host.docker.internal:8789}
      EMAIL_HELPER_TOKEN: ${EMAIL_HELPER_TOKEN:-}
      CALENDAR_HELPER_URL: ${CALENDAR_HELPER_URL:-http://host.docker.internal:8790}
      CALENDAR_HELPER_TOKEN: ${CALENDAR_HELPER_TOKEN:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "0.0.0.0:3005:3005"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3005/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      core-api:
        condition: service_started
      auth-access:
        condition: service_started

  worker-jobs:
    build:
      <<: *nestjs-build
      args:
        APP_NAME: worker-jobs
        GIT_SHA: ${GIT_SHA:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    restart: unless-stopped
    environment:
      <<: *common-env
      WORKER_JOBS_PORT: "3003"
      CORE_API_PORT: "3001"
      AUTH_ACCESS_PORT: "3002"
      AGENT_CLI_BRIDGE_URL: ${AGENT_CLI_BRIDGE_URL:-http://host.docker.internal:8787/run}
      AGENT_CLI_BRIDGE_TOKEN: ${AGENT_CLI_BRIDGE_TOKEN:-}
      AGENTS_ENABLED: ${AGENTS_ENABLED:-false}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:3003:3003"
    depends_on:
      redis:
        condition: service_healthy
      core-api:
        condition: service_started

  local-sync-bridge:
    build:
      <<: *nestjs-build
      args:
        APP_NAME: local-sync-bridge
        GIT_SHA: ${GIT_SHA:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    restart: unless-stopped
    environment:
      <<: *common-env
      LOCAL_SYNC_PORT: "3004"
      JOURNAL_DB_PATH: /data/journal.db
      CORE_API_PORT: "3001"
      AUTH_ACCESS_PORT: "3002"
      AGENT_CLI_BRIDGE_URL: ${AGENT_CLI_BRIDGE_URL:-http://host.docker.internal:8787/run}
      AGENT_CLI_BRIDGE_TOKEN: ${AGENT_CLI_BRIDGE_TOKEN:-}
      AGENTS_ENABLED: ${AGENTS_ENABLED:-false}
    ports:
      - "127.0.0.1:3004:3004"
    volumes:
      - journal-data:/data
    depends_on:
      core-api:
        condition: service_started

  # ── Frontend ─────────────────────────────────────────────────────────────────

  web-app:
    build:
      context: ../..
      dockerfile: apps/web-app/Dockerfile
      args:
        GIT_SHA: ${GIT_SHA:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    restart: unless-stopped
    environment:
      CORE_API_URL: http://core-api:3001
      AGENTS_ENABLED: ${AGENTS_ENABLED:-false}
      AUTH_URL: http://auth-access:3002
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      core-api:
        condition: service_started
      auth-access:
        condition: service_started


volumes:
  postgres-data:
  redis-data:
  journal-data:
  memgraph-data:
  memgraph-log:
